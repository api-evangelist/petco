principles:
  - name: Visibility
    description: Visibility lives at the contract level rather than per-API-call.
  - name: Allocation
    description: Allocate integration cost to the consuming Petco line of business (retail, vet,
      grooming, marketplace).
  - name: Optimization
    description: Consolidate vendor integrations onto a managed integration platform; avoid
      redundant point-to-point connections.
  - name: Accountability
    description: Vendor side and Petco business-unit owner jointly own the integration.
