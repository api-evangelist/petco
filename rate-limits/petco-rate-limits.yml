specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Petco Animal Supplies
providerId: petco
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Retail
  - Pet Care
notes: Petco does not operate a public API surface and does not publish rate limits. Any limits are
  contract-defined within the bilateral partner agreement.
description: Petco has no public, self-service API. Rate limits, if any, are defined in the partner
  integration contract rather than as a published numeric ceiling.
sources:
  - https://www.petco.com/
limits:
  - name: Partner Integration
    scope: contract
    metric: varies
    limit: 'governed by bilateral partner agreement; not publicly documented'
policies:
  - name: Contract-Defined Limits
    description: Throughput, retry, and SLAs are defined in the partner contract rather than as
      published rate limits.
maintainers:
